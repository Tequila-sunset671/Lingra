name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python: "3.10" }   # Linux x86_64, min Python
          - { os: ubuntu-latest, python: "3.12" }   # Linux x86_64
          - { os: windows-latest, python: "3.12" }  # Windows x64
          - { os: macos-latest, python: "3.12" }    # macOS ARM64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile all modules
        run: python -m py_compile core.py i18n.py translate.py translate_pdf.py transcribe.py app.py

      - name: Smoke test (imports, i18n, PDF font)
        run: python tests/smoke_test.py
